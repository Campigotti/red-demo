<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PokeNet Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f4ff;
    --panel: #ffffff;
    --border: #d4def7;
    --accent: #7c9ef5;
    --accent2: #f5a7c7;
    --accent3: #a8e6cf;
    --accent4: #ffd6a5;
    --text: #3a3a5c;
    --muted: #9099c0;
    --shadow: 0 4px 0 #c5cef0;
    --shadow-sm: 0 2px 0 #c5cef0;
    --pixel: 'Press Start 2P', monospace;
    --round: 'Nunito', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    background-image:
      radial-gradient(circle at 20% 20%, #e8eeff 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, #ffeef5 0%, transparent 50%),
      radial-gradient(circle at 50% 50%, #efffee 0%, transparent 70%);
    color: var(--text);
    font-family: var(--round);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* POKEBALL DOTS PATTERN */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle, #d4def7 1px, transparent 1px);
    background-size: 32px 32px;
    opacity: 0.4;
    pointer-events: none;
    z-index: 0;
  }

  header, main, .devices-panel, .chat-panel, .input-area, .panel-header, .chat-header, .net-info {
    position: relative;
    z-index: 1;
  }

  /* MODAL */
  #name-modal {
    position: fixed;
    inset: 0;
    background: rgba(200, 210, 255, 0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    backdrop-filter: blur(6px);
  }

  .modal-box {
    background: white;
    border: 3px solid var(--accent);
    border-radius: 20px;
    box-shadow: 0 8px 0 #b3bfee, 0 12px 32px rgba(124,158,245,0.2);
    padding: 36px 32px;
    max-width: 400px;
    width: 90%;
    text-align: center;
  }

  .modal-sprite {
    font-size: 52px;
    margin-bottom: 8px;
    display: block;
    animation: bounce 1s ease infinite alternate;
  }

  @keyframes bounce {
    from { transform: translateY(0); }
    to { transform: translateY(-8px); }
  }

  .modal-box h2 {
    font-family: var(--pixel);
    color: var(--accent);
    font-size: 0.7rem;
    letter-spacing: 0.05em;
    margin-bottom: 8px;
    line-height: 1.8;
  }

  .modal-box p {
    color: var(--muted);
    font-size: 0.85rem;
    margin-bottom: 20px;
    line-height: 1.6;
    font-weight: 600;
  }

  .modal-box input {
    width: 100%;
    background: var(--bg);
    border: 2px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: var(--round);
    font-weight: 700;
    font-size: 1rem;
    padding: 12px 16px;
    margin-bottom: 16px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    text-align: center;
  }

  .modal-box input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 4px rgba(124,158,245,0.15);
  }

  .modal-box input::placeholder { color: var(--muted); font-weight: 600; }

  .btn {
    background: var(--accent);
    border: none;
    border-radius: 12px;
    color: white;
    font-family: var(--round);
    font-weight: 800;
    font-size: 0.9rem;
    padding: 12px 28px;
    cursor: pointer;
    box-shadow: var(--shadow);
    transition: transform 0.1s, box-shadow 0.1s;
    letter-spacing: 0.03em;
  }

  .btn:hover { transform: translateY(-1px); box-shadow: 0 5px 0 #b3bfee; }
  .btn:active { transform: translateY(2px); box-shadow: none; }

  .btn.pink { background: var(--accent2); box-shadow: 0 4px 0 #e090b0; }
  .btn.pink:hover { box-shadow: 0 5px 0 #e090b0; }
  .btn.green { background: var(--accent3); color: #2a6b50; box-shadow: 0 4px 0 #88c9b0; }
  .btn.sm { font-size: 0.72rem; padding: 6px 14px; border-radius: 8px; }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    background: white;
    border-bottom: 3px solid var(--border);
    flex-shrink: 0;
    box-shadow: 0 2px 0 var(--border);
  }

  .logo {
    font-family: var(--pixel);
    font-size: 0.75rem;
    color: var(--accent);
    letter-spacing: 0.05em;
  }

  .logo span { color: var(--accent2); }

  .status-bar {
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--muted);
  }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--bg);
    border: 2px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 0.72rem;
    font-weight: 700;
  }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    display: inline-block;
  }
  .dot.online { background: #6ddc9a; box-shadow: 0 0 0 3px rgba(109,220,154,0.3); animation: pulse 2s infinite; }
  .dot.offline { background: #f5a7a7; }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 3px rgba(109,220,154,0.3); }
    50% { box-shadow: 0 0 0 5px rgba(109,220,154,0.1); }
  }

  /* MAIN */
  main {
    display: grid;
    grid-template-columns: 260px 1fr;
    flex: 1;
    overflow: hidden;
    gap: 0;
  }

  /* DEVICES PANEL */
  .devices-panel {
    border-right: 3px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: white;
  }

  .panel-header {
    padding: 12px 14px;
    border-bottom: 2px solid var(--border);
    font-family: var(--pixel);
    font-size: 0.5rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
    background: var(--bg);
  }

  #device-count {
    background: var(--accent);
    color: white;
    font-family: var(--pixel);
    font-size: 0.5rem;
    padding: 4px 8px;
    border-radius: 20px;
  }

  .devices-list {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .devices-list::-webkit-scrollbar { width: 4px; }
  .devices-list::-webkit-scrollbar-track { background: transparent; }
  .devices-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .device-card {
    background: var(--bg);
    border: 2px solid var(--border);
    border-radius: 14px;
    padding: 10px 12px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
  }

  .device-card:hover {
    border-color: var(--device-color, var(--accent));
    transform: translateY(-1px);
    box-shadow: 0 3px 0 var(--border);
  }

  .device-card.active {
    border-color: var(--device-color, var(--accent));
    background: white;
    box-shadow: 0 3px 0 var(--border);
  }

  .device-card.self {
    border-color: var(--accent);
    background: linear-gradient(135deg, #f0f4ff, #fff);
  }

  .device-top {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
  }

  .device-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    border: 2px solid white;
  }

  .device-name {
    font-size: 0.82rem;
    font-weight: 800;
    color: var(--text);
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .device-ip {
    font-size: 0.68rem;
    color: var(--muted);
    font-weight: 600;
    padding-left: 40px;
  }

  .self-badge {
    font-size: 0.55rem;
    background: var(--accent);
    color: white;
    padding: 2px 7px;
    border-radius: 10px;
    font-weight: 800;
    flex-shrink: 0;
  }

  .ping-btn {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    background: var(--accent4);
    border: 2px solid #f0c080;
    border-radius: 8px;
    color: #8b5e00;
    font-family: var(--round);
    font-weight: 800;
    font-size: 0.65rem;
    padding: 4px 9px;
    cursor: pointer;
    transition: all 0.15s;
    display: none;
  }

  .device-card:hover .ping-btn { display: block; }
  .ping-btn:hover { background: #ffc040; transform: translateY(-50%) scale(1.05); }

  /* CHAT PANEL */
  .chat-panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
  }

  .chat-header {
    padding: 12px 18px;
    border-bottom: 3px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    background: white;
  }

  .chat-title {
    font-family: var(--pixel);
    font-size: 0.55rem;
    color: var(--accent2);
    letter-spacing: 0.08em;
  }

  .chat-subtitle {
    font-size: 0.75rem;
    color: var(--muted);
    font-weight: 700;
    margin-top: 3px;
  }

  /* MESSAGES */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg {
    animation: popIn 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.92) translateY(6px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .msg.system {
    text-align: center;
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--muted);
    padding: 4px 0;
  }

  .msg.system span {
    background: white;
    border: 2px solid var(--border);
    border-radius: 20px;
    padding: 4px 14px;
    display: inline-block;
  }

  .bubble-wrap {
    display: flex;
    align-items: flex-end;
    gap: 8px;
  }

  .bubble-wrap.own { flex-direction: row-reverse; }

  .bubble-avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
    border: 2px solid white;
    box-shadow: var(--shadow-sm);
  }

  .bubble-content { max-width: 75%; }

  .bubble-name {
    font-size: 0.68rem;
    font-weight: 800;
    color: var(--muted);
    margin-bottom: 3px;
    padding: 0 4px;
  }

  .bubble-wrap.own .bubble-name { text-align: right; }

  .bubble {
    background: white;
    border: 2px solid var(--border);
    border-radius: 16px 16px 16px 4px;
    padding: 8px 14px;
    font-size: 0.88rem;
    font-weight: 600;
    color: var(--text);
    line-height: 1.5;
    box-shadow: var(--shadow-sm);
    word-break: break-word;
  }

  .bubble-wrap.own .bubble {
    background: var(--accent);
    border-color: #6a8ee0;
    color: white;
    border-radius: 16px 16px 4px 16px;
    box-shadow: 0 3px 0 #6a8ee0;
  }

  .bubble.private {
    background: #fff0f8;
    border-color: var(--accent2);
    border-radius: 16px 16px 16px 4px;
  }

  .bubble-wrap.own .bubble.private {
    background: var(--accent2);
    border-color: #e090b0;
    box-shadow: 0 3px 0 #e090b0;
  }

  .private-tag {
    font-size: 0.6rem;
    background: var(--accent2);
    color: white;
    padding: 1px 7px;
    border-radius: 10px;
    font-weight: 800;
    margin-left: 6px;
  }

  .bubble-time {
    font-size: 0.62rem;
    color: var(--muted);
    padding: 2px 4px;
    font-weight: 600;
  }

  .bubble-wrap.own .bubble-time { text-align: right; }

  .msg.ping-msg {
    text-align: center;
    font-size: 0.72rem;
    font-weight: 800;
  }

  .msg.ping-msg span {
    background: var(--accent4);
    border: 2px solid #f0c080;
    color: #8b5e00;
    border-radius: 20px;
    padding: 5px 16px;
    display: inline-block;
  }

  /* INPUT */
  .input-area {
    padding: 12px 16px;
    border-top: 3px solid var(--border);
    background: white;
    flex-shrink: 0;
  }

  .target-indicator {
    font-size: 0.75rem;
    font-weight: 800;
    color: #c060a0;
    margin-bottom: 8px;
    display: none;
    align-items: center;
    gap: 8px;
    background: #fff0f8;
    border: 2px solid var(--accent2);
    border-radius: 10px;
    padding: 6px 12px;
  }

  .target-indicator.visible { display: flex; }

  .target-cancel {
    background: none;
    border: none;
    color: #e08090;
    cursor: pointer;
    font-weight: 800;
    font-size: 0.8rem;
    margin-left: auto;
  }

  .input-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  #msg-input {
    flex: 1;
    background: var(--bg);
    border: 2px solid var(--border);
    border-radius: 14px;
    color: var(--text);
    font-family: var(--round);
    font-weight: 700;
    font-size: 0.9rem;
    padding: 10px 16px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  #msg-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 4px rgba(124,158,245,0.15);
  }

  #msg-input::placeholder { color: var(--muted); }
  #msg-input:disabled { opacity: 0.5; }

  /* NET INFO */
  .net-info {
    padding: 8px 14px;
    border-top: 2px solid var(--border);
    font-size: 0.68rem;
    font-weight: 700;
    color: var(--muted);
    display: flex;
    gap: 12px;
    flex-shrink: 0;
    background: var(--bg);
  }

  .net-info span { color: var(--accent); }

  /* PING FLASH */
  .ping-flash {
    position: fixed;
    inset: 0;
    background: rgba(255, 220, 150, 0.35);
    pointer-events: none;
    animation: flashOut 0.7s ease forwards;
    z-index: 500;
    border: 4px solid rgba(255, 200, 100, 0.6);
  }

  @keyframes flashOut {
    0% { opacity: 1; }
    100% { opacity: 0; }
  }

  @media (max-width: 600px) {
    main { grid-template-columns: 1fr; }
    .devices-panel { display: none; }
  }

  /* SPRITES para dispositivos */
  .sprite { font-size: 18px; }
</style>
</head>
<body>

<!-- MODAL -->
<div id="name-modal">
  <div class="modal-box">
    <span class="modal-sprite">🌐</span>
    <h2>POKENET HUB</h2>
    <p>¡Elige un nombre para tu dispositivo<br>y únete a la red!</p>
    <input type="text" id="name-input" placeholder="Ej: PC-Rojo, Tablet-Misty..." maxlength="24" autofocus>
    <button class="btn" onclick="connect()">¡CONECTAR! →</button>
  </div>
</div>

<!-- HEADER -->
<header>
  <div class="logo">POKE<span>NET</span></div>
  <div class="status-bar">
    <div class="status-pill">
      <span class="dot offline" id="status-dot"></span>
      <span id="status-text">Desconectado</span>
    </div>
    <div class="status-pill" id="my-ip-display" style="display:none">
      📍 <span id="my-ip">—</span>
    </div>
  </div>
</header>

<!-- MAIN -->
<main>
  <!-- DEVICES -->
  <div class="devices-panel">
    <div class="panel-header">
      <span>ENTRENADORES</span>
      <span id="device-count">0</span>
    </div>
    <div class="devices-list" id="devices-list">
      <div style="padding:20px; text-align:center; color:var(--muted); font-size:0.78rem; font-weight:700;">
        Buscando dispositivos...
      </div>
    </div>
    <div class="net-info">
      SERVER: <span id="server-ip-display">—</span>
    </div>
  </div>

  <!-- CHAT -->
  <div class="chat-panel">
    <div class="chat-header">
      <div>
        <div class="chat-title">CHAT POKECENTER</div>
        <div class="chat-subtitle" id="chat-subtitle">📢 Canal general</div>
      </div>
      <button class="btn pink sm" onclick="clearChat()">Limpiar</button>
    </div>

    <div id="messages">
      <div class="msg system"><span>Sistema iniciado — esperando conexión...</span></div>
    </div>

    <div class="input-area">
      <div class="target-indicator" id="target-indicator">
        💌 Mensaje privado para: <strong id="target-name"></strong>
        <button class="target-cancel" onclick="clearTarget()">✕</button>
      </div>
      <div class="input-row">
        <input type="text" id="msg-input" placeholder="Escribe un mensaje..." maxlength="500" disabled>
        <button class="btn" id="send-btn" onclick="sendMsg()" disabled>Enviar ▶</button>
      </div>
    </div>
  </div>
</main>

<script>
  const SPRITES = ['🔵','🔴','🟡','🟢','🟠','🟣','🩵','🩷','🤍','💚'];
  const COLORS = ['#7c9ef5','#f5a7a7','#ffd6a5','#a8e6cf','#f5c8a7','#c9b4f5','#a7d8f5','#f5b4d4','#b4f5e8','#e8f5b4'];
  const BG_COLORS = ['#eef2ff','#fff0f0','#fff8ee','#f0fff8','#fff5ee','#f5f0ff','#eef8ff','#fff0f8','#eefffc','#f8ffee'];

  let ws = null, myId = null, myName = '', myColor = '', mySprite = '';
  let targetId = null, targetName = '';
  const clientsMap = new Map();

  const serverHost = window.location.hostname;
  const serverPort = window.location.port || '3000';
  const wsUrl = `ws://${serverHost}:${serverPort}`;

  function getSprite(id) { return SPRITES[(id - 1) % SPRITES.length]; }
  function getColor(id) { return COLORS[(id - 1) % COLORS.length]; }
  function getBg(id) { return BG_COLORS[(id - 1) % BG_COLORS.length]; }

  function connect() {
    const input = document.getElementById('name-input');
    const name = input.value.trim();
    if (!name) {
      input.style.borderColor = '#f5a7a7';
      setTimeout(() => input.style.borderColor = '', 1500);
      return;
    }
    myName = name;
    document.getElementById('name-modal').style.display = 'none';
    initWebSocket();
  }

  document.getElementById('name-input').addEventListener('keydown', e => { if (e.key === 'Enter') connect(); });
  document.getElementById('msg-input').addEventListener('keydown', e => { if (e.key === 'Enter') sendMsg(); });

  function initWebSocket() {
    updateStatus('connecting');
    ws = new WebSocket(wsUrl);

    ws.onopen = () => {
      updateStatus('online');
      ws.send(JSON.stringify({ type: 'set_name', name: myName }));
      document.getElementById('msg-input').disabled = false;
      document.getElementById('send-btn').disabled = false;
    };

    ws.onclose = () => {
      updateStatus('offline');
      document.getElementById('msg-input').disabled = true;
      document.getElementById('send-btn').disabled = true;
      addSystemMsg('Conexión perdida — reconectando...');
      setTimeout(() => initWebSocket(), 3000);
    };

    ws.onerror = () => addSystemMsg('Error de conexión.');

    ws.onmessage = (event) => handleMessage(JSON.parse(event.data));
  }

  function handleMessage(msg) {
    switch (msg.type) {
      case 'welcome':
        myId = msg.id;
        myColor = getColor(myId);
        mySprite = getSprite(myId);
        document.getElementById('server-ip-display').textContent = msg.serverIP;
        document.getElementById('my-ip').textContent = window.location.hostname;
        document.getElementById('my-ip-display').style.display = 'flex';
        clientsMap.clear();
        msg.clients.forEach(c => clientsMap.set(c.id, c));
        renderDevices();
        addSystemMsg(`¡Conectado como "${myName}"! (${msg.clients.length} dispositivos en red)`);
        break;
      case 'client_joined':
        clientsMap.set(msg.client.id, msg.client);
        renderDevices();
        addSystemMsg(`${getSprite(msg.client.id)} ${msg.client.name} se unió desde ${msg.client.ip}`);
        break;
      case 'client_left':
        clientsMap.delete(msg.id);
        renderDevices();
        addSystemMsg(`${msg.name} se desconectó`);
        break;
      case 'client_updated':
        clientsMap.set(msg.client.id, msg.client);
        renderDevices();
        break;
      case 'chat':
        if (msg.target !== null && msg.target !== myId && msg.from !== myId) break;
        addChatBubble(msg);
        break;
      case 'ping_received':
        showPingFlash();
        addPingMsg(`⚡ ¡PING de ${msg.fromName}!`);
        break;
      case 'ping_sent':
        addPingMsg(`⚡ Ping enviado a ${msg.targetName}`);
        break;
    }
  }

  function renderDevices() {
    const list = document.getElementById('devices-list');
    document.getElementById('device-count').textContent = clientsMap.size;
    list.innerHTML = '';
    const sorted = Array.from(clientsMap.values()).sort((a, b) => a.id === myId ? -1 : 1);
    sorted.forEach(client => {
      const isSelf = client.id === myId;
      const sprite = getSprite(client.id);
      const color = getColor(client.id);
      const bg = getBg(client.id);
      const div = document.createElement('div');
      div.className = `device-card${isSelf ? ' self' : ''}${targetId === client.id ? ' active' : ''}`;
      div.style.setProperty('--device-color', color);
      div.innerHTML = `
        <div class="device-top">
          <div class="device-avatar" style="background:${bg}; border-color:${color}">
            <span class="sprite">${sprite}</span>
          </div>
          <span class="device-name">${escHtml(client.name)}</span>
          ${isSelf ? '<span class="self-badge">TÚ</span>' : `<button class="ping-btn" onclick="pingDevice(${client.id},'${escHtml(client.name)}',event)">⚡PING</button>`}
        </div>
        <div class="device-ip">${client.ip}</div>
      `;
      if (!isSelf) div.onclick = (e) => { if (e.target.classList.contains('ping-btn')) return; setTarget(client.id, client.name); };
      list.appendChild(div);
    });
  }

  function setTarget(id, name) {
    targetId = id; targetName = name;
    document.getElementById('target-name').textContent = name;
    document.getElementById('target-indicator').classList.add('visible');
    document.getElementById('chat-subtitle').textContent = `💌 Privado → ${name}`;
    document.getElementById('msg-input').placeholder = `Mensaje privado para ${name}...`;
    renderDevices();
  }

  function clearTarget() {
    targetId = null; targetName = '';
    document.getElementById('target-indicator').classList.remove('visible');
    document.getElementById('chat-subtitle').textContent = '📢 Canal general';
    document.getElementById('msg-input').placeholder = 'Escribe un mensaje...';
    renderDevices();
  }

  function sendMsg() {
    const input = document.getElementById('msg-input');
    const text = input.value.trim();
    if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
    ws.send(JSON.stringify({ type: 'chat', text, target: targetId }));
    input.value = '';
  }

  function pingDevice(id, name, event) {
    event.stopPropagation();
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    ws.send(JSON.stringify({ type: 'ping_device', targetId: id }));
  }

  function addSystemMsg(text) {
    const div = document.createElement('div');
    div.className = 'msg system';
    div.innerHTML = `<span>${escHtml(text)}</span>`;
    appendMsg(div);
  }

  function addChatBubble(msg) {
    const isOwn = msg.from === myId;
    const isPrivate = msg.target !== null;
    const sprite = getSprite(msg.from);
    const color = getColor(msg.from);
    const bg = getBg(msg.from);
    const time = new Date(msg.timestamp).toLocaleTimeString('es', { hour: '2-digit', minute: '2-digit' });

    const div = document.createElement('div');
    div.className = 'msg';
    div.innerHTML = `
      <div class="bubble-wrap${isOwn ? ' own' : ''}">
        <div class="bubble-avatar" style="background:${bg}; border-color:${color}">${sprite}</div>
        <div class="bubble-content">
          <div class="bubble-name" style="color:${color}">
            ${escHtml(msg.fromName)}
            ${isPrivate ? `<span class="private-tag">${isOwn ? '→ privado' : '← privado'}</span>` : ''}
          </div>
          <div class="bubble${isPrivate ? ' private' : ''}">${escHtml(msg.text)}</div>
          <div class="bubble-time">${time}</div>
        </div>
      </div>`;
    appendMsg(div);
  }

  function addPingMsg(text) {
    const div = document.createElement('div');
    div.className = 'msg ping-msg';
    div.innerHTML = `<span>${escHtml(text)}</span>`;
    appendMsg(div);
  }

  function appendMsg(div) {
    const c = document.getElementById('messages');
    c.appendChild(div);
    c.scrollTop = c.scrollHeight;
  }

  function clearChat() {
    document.getElementById('messages').innerHTML = '';
    addSystemMsg('Chat limpiado ✨');
  }

  function showPingFlash() {
    const f = document.createElement('div');
    f.className = 'ping-flash';
    document.body.appendChild(f);
    setTimeout(() => f.remove(), 800);
  }

  function updateStatus(state) {
    const dot = document.getElementById('status-dot');
    const text = document.getElementById('status-text');
    dot.className = 'dot';
    if (state === 'online') { dot.classList.add('online'); text.textContent = 'Conectado'; }
    else if (state === 'offline') { dot.classList.add('offline'); text.textContent = 'Desconectado'; }
    else text.textContent = 'Conectando...';
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
